                    emphasis: {
                        label: { show: false },
                        itemStyle: { areaColor: '#667eea', shadowColor: 'rgba(102,126,234,0.5)', shadowBlur: 20 }
                    },
                    itemStyle: {
                        areaColor: '#f3f4f6',
                        borderColor: '#d1d5db',
                        borderWidth: 1
                    }
                },
                series: [
                    {
                        name: '中国地图',
                        type: 'map',
                        geoIndex: 0,
                        select: { disabled: true }
                    },
                    {
                        name: '省份标签',
                        type: 'scatter',
                        coordinateSystem: 'geo',
                        data: scatterData,
                        zlevel: 2,
                        symbolSize: 0,
                        tooltip: { show: false },
                        emphasis: {
                            label: {
                                fontSize: 14,
                                fontWeight: 'bold'
                            }
                        }
                    }
                ]
            };

            chart.setOption(option, true);

            // 绑定点击事件
            chart.off('click');
            chart.on('click', function(params) {
                if (params.seriesType === 'map' && params.name && provinceStrategicCities[params.name]) {
                    renderProvinceMap(params.name);
                } else if (params.seriesType === 'scatter' && params.name && provinceStrategicCities[params.name]) {
                    renderProvinceMap(params.name);
                }
            });
        }

        // ===== 省份地图视图（地级市列表） =====
        function renderProvinceMap(province) {
            currentView = 'province';
            currentProvince = province;
            updateBreadcrumb();
            showCityList(province);

            // 计算省份中心
            const cities = provinceStrategicCities[province] || [];
            const center = provinceCoords[province];

            // 构建地级市标签数据（只显示地级市）
            const scatterData = cities.map(city => {
                const coords = cityCoords[city];
                const d = cityBusinessData[city];
                const color = getCityStatusColor(city);

                return {
                    name: city,
                    value: coords,
                    itemStyle: { color: color },
                    label: {
                        show: true,
                        formatter: city,
                        fontSize: 12,
                        fontWeight: 'bold',
                        color: '#fff',
                        backgroundColor: color,
                        padding: [5, 10],
                        borderRadius: 4,
                        borderWidth: 2,
                        borderColor: '#fff'
                    },
                    symbolSize: 0,
                    labelLayout: { hideOverlap: true, dx: 10 }
                };
            });

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        if (params.name) {
                            const cityName = params.name;
                            const d = cityBusinessData[cityName];
                            if (d && d.businesses.length > 0) {
                                return `<strong>${cityName}</strong><br>` +
                                       d.businesses.map(b => `${b.icon} ${b.name}`).join('<br>');
                            }
                            return `<strong>${cityName}</strong><br>暂无业务数据`;
                        }
                        return '';
                    }
                },
                geo: {
                    map: 'china',
                    roam: true,
                    zoom: 3,
                    center: center,
                    scaleLimit: { min: 2, max: 10 },
                    emphasis: {
                        label: { show: true },
                        itemStyle: { areaColor: '#667eea' }
                    },
                    itemStyle: {
                        areaColor: '#f3f4f6',
                        borderColor: '#d1d5db',
                        borderWidth: 1
                    }
                },
                series: [
                    {
                        name: province,
                        type: 'map',
                        geoIndex: 0,
                        select: { disabled: true }
                    },
                    {
                        name: '城市标签',
                        type: 'scatter',
                        coordinateSystem: 'geo',
                        data: scatterData,
                        zlevel: 2,
                        symbolSize: 0,
                        tooltip: { show: false },
                        emphasis: {
                            label: {
                                fontSize: 13,
                                fontWeight: 'bold'
                            }
                        }
                    }
                ]
            };

            chart.setOption(option, true);

            // 绑定点击事件：点击地级市 → 进入区县视图
            chart.off('click');
            chart.on('click', function(params) {
                if (params.seriesType === 'scatter' && params.name && cities.includes(params.name)) {
                    renderCityView(province, params.name);
                }
            });
        }

        // ===== 地级市视图（区县列表） =====
        function renderCityView(province, cityName) {
            currentView = 'city';
            currentProvince = province;
            currentCity = cityName;
            updateBreadcrumb();
            showDistrictList(province, cityName);
        }

        // ===== 显示地级市列表（右侧） =====
        function showCityList(province) {
            document.getElementById('cityDetailTitle').innerHTML = `🏙️ ${province} · 地级市`;
            const list = document.getElementById('listContainer');
            const cities = provinceStrategicCities[province] || [];

            list.innerHTML = cities.map(city => {
                const d = cityBusinessData[city];
                // 使用status字段判断：active=绿色有业务，expanding=蓝色积极拓展
                const status = d ? (d.status || 'expanding') : 'expanding';
                const center = d ? d.center : '积极拓展中';
                const statusText = status === 'active' ? '有业务' : '积极拓展';

                return `
                <div class="list-item" onclick="renderCityView('${province}', '${city}')">
                    <div class="list-icon ${status}">${status === 'active' ? '🏘️' : '📍'}</div>
                    <div class="list-info">
                        <div class="list-name">${city}</div>
                        <div class="list-center">${center}</div>
                    </div>
                    <span class="list-status status-${status}">${statusText}</span>
                </div>
                `;
            }).join('');
        }

        // ===== 显示区县列表（右侧） =====
        function showDistrictList(province, cityName) {
            document.getElementById('cityDetailTitle').innerHTML = `📍 ${cityName}`;
            const list = document.getElementById('listContainer');
            const districts = cityDistricts[cityName] || [];

            if (districts.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>该地级市暂无区县数据</p></div>';
                return;
            }

            // 苏州特殊处理：分成"苏州总部"和"常熟城市中心"两个子组
            if (cityName === '苏州市') {
                const changShuDistricts = ['常熟市'];
                const suzhouHQDistricts = districts.filter(d => !changShuDistricts.includes(d));
                const changShuList = districts.filter(d => changShuDistricts.includes(d));

                const renderGroup = (groupName, groupDistricts) => {
                    const items = groupDistricts.map(district => {
                        const d = getDistrictData(cityName, district);
                        const status = d && d.businesses && d.businesses.length > 0 ? 'active' : 'none';
                        const statusText = status === 'active' ? '有业务' : '未开展业务';
                        return `
                        <div class="list-item" onclick="showDistrictDetail('${province}', '${cityName}', '${district}')">
                            <div class="list-icon ${status}">${status === 'active' ? '🏘️' : '📍'}</div>
                            <div class="list-info">
                                <div class="list-name">${district}</div>
                            </div>
                            <span class="list-status status-${status}">${statusText}</span>
                        </div>`;
                    }).join('');
                    return `
                    <div style="margin-bottom:12px;">
                        <div style="font-size:0.82em;color:#a5b4fc;font-weight:600;padding:6px 12px;margin-bottom:4px;background:rgba(102,126,234,0.15);border-radius:8px;">📌 ${groupName}</div>
                        ${items}
                    </div>`;
                };

                list.innerHTML = renderGroup('苏州总部', suzhouHQDistricts) + renderGroup('常熟城市中心', changShuList);
                return;
            }

            list.innerHTML = districts.map(district => {
                const d = getDistrictData(cityName, district);
                const center = d ? d.center : '';
                const status = d && d.businesses && d.businesses.length > 0 ? 'active' : 'none';
                const statusText = status === 'active' ? '有业务' : '未开展业务';

                return `
                <div class="list-item" onclick="showDistrictDetail('${province}', '${cityName}', '${district}')">
                    <div class="list-icon ${status}">${status === 'active' ? '🏘️' : '📍'}</div>
                    <div class="list-info">
                        <div class="list-name">${district}</div>
                        ${center ? `<div class="list-center">${center}</div>` : ''}
                    </div>
                    <span class="list-status status-${status}">${statusText}</span>
                </div>
                `;
            }).join('');
        }

        // ===== 区县详情视图（16个业务线） =====
        function showDistrictDetail(province, cityName, districtName) {
            currentView = 'district';
            currentProvince = province;
            currentCity = cityName;
            currentDistrict = districtName;
            updateBreadcrumb();

            document.getElementById('cityDetailTitle').innerHTML = `📍 ${districtName}`;
            const list = document.getElementById('listContainer');
            const d = getDistrictData(cityName, districtName);

            // 无论有无业务数据，都显示16个业务线（没有则全部待开展）
            const centerName = d ? d.center : '积极拓展中';
            
            // 计算合计
            let totalCount = 0;
            let activeCount = 0;
            
            list.innerHTML = allBusinessLines.map(b => {
                const businessStatus = d && d.businesses ? d.businesses.find(db => db.name === b.name) : null;
                const status = businessStatus ? businessStatus.status : 'none';
                const statusText = status === 'active' ? '已开展' : '待开展';
                const statusIcon = status === 'active' ? '🏘️' : '🟠';
                const count = status === 'active' && businessStatus.count ? businessStatus.count : 0;
                
                if (status === 'active') {
                    totalCount += count;
                    activeCount++;
                }

                const countBadge = count > 0 ? `<span class="list-count">${count}个</span>` : '';

                return `
                <div class="list-item">
                    <div class="list-icon ${status}">${statusIcon}</div>
                    <div class="list-info">
                        <div class="list-name">${b.name}</div>
                        <div class="list-center">${centerName}</div>
                    </div>
                    ${countBadge}
                    <span class="list-status status-${status}">${statusText}</span>
                </div>
                `;
            }).join('');
            
            // 添加合计卡片
            const totalCard = document.createElement('div');
            totalCard.className = 'total-card';
            totalCard.innerHTML = `
                <div class="total-stat">
                    <div class="total-label">经营单元合计</div>
                    <div class="total-number">${totalCount}</div>
                    <div class="total-unit">个</div>
                </div>
                <div class="total-divider"></div>
                <div class="total-stat">
                    <div class="total-label">已开展业务</div>
                    <div class="total-number">${activeCount}</div>
                    <div class="total-unit">条</div>
                </div>
            `;
            list.insertBefore(totalCard, list.firstChild);
        }

        // ===== 获取城市状态颜色 =====
        function getCityStatusColor(city) {
            const d = cityBusinessData[city];
            if (!d) return '#3b82f6'; // 蓝色 - 表中有但无业务数据
            if (d.status === 'active') return '#10b981'; // 绿色 - 有业务
            if (d.status === 'expanding') return '#3b82f6'; // 蓝色 - 积极拓展
            return '#9ca3af'; // 灰色 - 无业务
        }

        // ===== 更新面包屑导航 =====
        function updateBreadcrumb() {
            const el = document.getElementById('breadcrumb');
            if (currentView === 'china') {
                el.innerHTML = '<span class="breadcrumb-item active">🏠 全国</span>';
            } else if (currentView === 'province') {
                el.innerHTML = `
                    <span class="breadcrumb-item" onclick="renderChinaMap()">🏠 全国</span>
                    <span class="breadcrumb-item breadcrumb-sep">›</span>
                    <span class="breadcrumb-item active">${currentProvince}</span>
                `;
            } else if (currentView === 'city') {
                el.innerHTML = `
                    <span class="breadcrumb-item" onclick="renderChinaMap()">🏠 全国</span>
                    <span class="breadcrumb-item breadcrumb-sep">›</span>
                    <span class="breadcrumb-item" onclick="renderProvinceMap('${currentProvince}')">${currentProvince}</span>
                    <span class="breadcrumb-item breadcrumb-sep">›</span>
                    <span class="breadcrumb-item active">${currentCity}</span>
                `;
            } else if (currentView === 'district') {
                el.innerHTML = `
                    <span class="breadcrumb-item" onclick="renderChinaMap()">🏠 全国</span>
                    <span class="breadcrumb-item breadcrumb-sep">›</span>
                    <span class="breadcrumb-item" onclick="renderProvinceMap('${currentProvince}')">${currentProvince}</span>
                    <span class="breadcrumb-item breadcrumb-sep">›</span>
                    <span class="breadcrumb-item" onclick="renderCityView('${currentProvince}', '${currentCity}')">${currentCity}</span>
                    <span class="breadcrumb-item breadcrumb-sep">›</span>
                    <span class="breadcrumb-item active">${currentDistrict}</span>
                `;
            }
        }

        // ===== 更新统计数据 =====
        function updateStats() {
            const provinces = new Set(Object.keys(provinceStrategicCities));
            const cities = Object.keys(cityBusinessData);
            let activeCities = 0, expandingCities = 0;

            cities.forEach(c => {
                const d = cityBusinessData[c];
                if (d) {
                    if (d.status === 'active') activeCities++;
                    else if (d.status === 'expanding') expandingCities++;
                }
            });

            document.getElementById('provinceCount').textContent = provinces.size;
            document.getElementById('cityCount').textContent = cities.length;
            document.getElementById('businessCount').textContent = activeCities;
            document.getElementById('expandingCount').textContent = expandingCities;
        }

        // ===== 页面加载完成后初始化 =====
        window.onload = initChart;
    </script>
</body>
</html>
